name: Host2Play Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,8 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================
      # 变动点：弃用 Node，改用 Python 环境
      # =========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      - name: Install Hysteria2
        working-directory: scripts
        run: |
          curl -L -o hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/

      - name: Install Python dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          python -m seleniumbase install chromedriver

      - name: Download Buster extension
        working-directory: scripts
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster.zip https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          7z x -y extensions/buster.zip -oextensions/buster/unpacked

      - name: Run Python renew script
        working-directory: scripts
        env:
          RENEW_URLS: ${{ secrets.RENEW_URLS }}
          PROXY_JSON: ${{ secrets.PROXY_JSON }}
        run: |
          mkdir -p screenshots
          xvfb-run -a python renew.py

      # =========================================
      # 🚀 发送 Telegram 截图通知 (合并为单次相册)
      # =========================================
      - name: Send Consolidated Telegram Notification
        if: always()
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[TG通知] 未配置 Telegram 变量，跳过通知。"
            exit 0
          fi

          python3 -c '
          import os, requests, glob, json

          token = os.environ.get("TELEGRAM_BOT_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")

          success_files = glob.glob("screenshots/4_final_result_*.png")
          error_files = glob.glob("screenshots/error_crash_*.png")
          all_files = success_files + error_files

          if not all_files:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", data={
                  "chat_id": chat_id, 
                  "text": "🤖 *机器续期通知*\n任务已运行，但未生成任何截图。",
                  "parse_mode": "Markdown"
              })
              exit(0)

          media = []
          files = {}
          caption = f"🤖 *主机续期合并报告*\n✅ 成功任务: {len(success_files)} 个\n❌ 异常/崩溃: {len(error_files)} 个"

          for i, path in enumerate(all_files[:10]):
              name = f"photo{i}"
              media_item = {
                  "type": "photo",
                  "media": f"attach://{name}"
              }
              if i == 0:
                  media_item["caption"] = caption
                  media_item["parse_mode"] = "Markdown"
              media.append(media_item)
              files[name] = open(path, "rb")

          requests.post(
              f"https://api.telegram.org/bot{token}/sendMediaGroup",
              data={"chat_id": chat_id, "media": json.dumps(media)},
              files=files
          )
          '
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6
