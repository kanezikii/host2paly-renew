name: Host2Play Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,8 * * *"

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        working-directory: scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full

      - name: Install Hysteria2
        working-directory: scripts
        run: |
          curl -L -o hysteria https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
          chmod +x hysteria
          sudo mv hysteria /usr/local/bin/
          hysteria version

      - name: Install Node dependencies
        working-directory: scripts
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Download NopeCHA extension
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha
          wget -O extensions/nopecha/chromium.zip https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
      
      - name: Unpack NopeCHA extension
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha/unpacked
          7z x -y extensions/nopecha/chromium.zip -oextensions/nopecha/unpacked

      - name: Run renew script
        working-directory: scripts
        env:
          H2P_EMAIL: ${{ secrets.H2P_EMAIL }}
          H2P_PASSWORD: ${{ secrets.H2P_PASSWORD }}
          RENEW_URLS: ${{ secrets.RENEW_URLS }}
          PROXY_JSON: ${{ secrets.PROXY_JSON }}
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      # =========================
      # 🚀 发送 Telegram 截图通知 (合并为单次通知)
      # =========================
      - name: Send Consolidated Telegram Notification
        if: always()
        working-directory: scripts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[TG通知] 未配置 Telegram 变量，跳过通知。"
            exit 0
          fi

          python3 -c '
          import os, requests, glob, json

          token = os.environ.get("TELEGRAM_BOT_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")

          success_files = glob.glob("screenshots/4_final_result_*.png")
          error_files = glob.glob("screenshots/error_crash_*.png")
          all_files = success_files + error_files

          if not all_files:
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", data={
                  "chat_id": chat_id, 
                  "text": "🤖 *机器续期通知*\n任务已运行，但未生成任何截图。",
                  "parse_mode": "Markdown"
              })
              exit(0)

          media = []
          files = {}
          caption = f"🤖 *主机续期合并报告*\n✅ 成功任务: {len(success_files)} 个\n❌ 异常/崩溃: {len(error_files)} 个"

          # 选取最多10张图片（TG单次MediaGroup限制）
          for i, path in enumerate(all_files[:10]):
              name = f"photo{i}"
              media_item = {
                  "type": "photo",
                  "media": f"attach://{name}"
              }
              if i == 0:
                  media_item["caption"] = caption
                  media_item["parse_mode"] = "Markdown"
              media.append(media_item)
              files[name] = open(path, "rb")

          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMediaGroup",
              data={"chat_id": chat_id, "media": json.dumps(media)},
              files=files
          )
          print(f"[TG通知] 合并发送完成，状态码: {resp.status_code}")
          '
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: scripts/screenshots/**
          if-no-files-found: warn
          compression-level: 6
